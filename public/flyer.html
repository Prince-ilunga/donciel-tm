<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DONCIEL™ - Journal de Trading Professionnel</title>
  <meta property="og:title" content="DONCIEL™ - Journal de Trading Professionnel">
  <meta property="og:description" content="Journal de trading ultra professionnel avec analyses avancées, statistiques en temps réel et outils IA.">
  <meta property="og:image" content="/flyer.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="/logo.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .flyer {
      position: relative;
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      background: linear-gradient(160deg, #0a0a1a 0%, #0d0d2b 40%, #0a0a1a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 28px;
      text-align: center;
    }
    .flyer::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(212,175,55,0.06) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(212,175,55,0.04) 0%, transparent 50%);
      pointer-events: none;
    }
    .logo-container {
      position: relative;
      margin-bottom: 32px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .logo-box {
      width: 88px;
      height: 88px;
      background: linear-gradient(135deg, #1a1a3e 0%, #0d0d2b 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      border: 2px solid rgba(212,175,55,0.3);
      box-shadow: 0 0 40px rgba(212,175,55,0.1), 0 8px 32px rgba(0,0,0,0.4);
    }
    .logo-box span {
      font-size: 48px;
      font-weight: 900;
      background: linear-gradient(135deg, #d4af37 0%, #f5d76e 50%, #d4af37 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #d4af37 0%, #f5d76e 40%, #d4af37 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .brand sup {
      font-size: 14px;
      letter-spacing: 0;
    }
    .subtitle {
      font-size: 15px;
      color: rgba(255,255,255,0.6);
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 48px;
    }
    .features {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 48px;
      width: 100%;
      max-width: 320px;
    }
    .feature {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 18px;
      background: rgba(212,175,55,0.04);
      border: 1px solid rgba(212,175,55,0.1);
      border-radius: 14px;
      text-align: left;
    }
    .feature-icon {
      font-size: 22px;
      flex-shrink: 0;
    }
    .feature-text {
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      font-weight: 500;
    }
    .cta-button {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 18px 40px;
      background: linear-gradient(135deg, #d4af37 0%, #c5a028 100%);
      color: #0a0a0f;
      font-size: 16px;
      font-weight: 800;
      text-decoration: none;
      border-radius: 60px;
      letter-spacing: 1px;
      text-transform: uppercase;
      box-shadow: 0 4px 24px rgba(212,175,55,0.3), 0 0 60px rgba(212,175,55,0.1);
      transition: all 0.3s ease;
      margin-bottom: 24px;
    }
    .cta-button:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 32px rgba(212,175,55,0.4), 0 0 80px rgba(212,175,55,0.15);
    }
    .cta-button:active {
      transform: translateY(0) scale(0.98);
    }
    .cta-button svg {
      width: 20px;
      height: 20px;
    }
    .share-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: transparent;
      color: rgba(212,175,55,0.8);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid rgba(212,175,55,0.25);
      border-radius: 60px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
    }
    .share-button:hover {
      background: rgba(212,175,55,0.08);
      border-color: rgba(212,175,55,0.4);
      color: #d4af37;
    }
    .share-button svg {
      width: 16px;
      height: 16px;
    }
    .url-text {
      margin-top: 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 1px;
      font-weight: 500;
    }
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,0.3), transparent);
      margin: 32px auto;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(212,175,55,0.15);
      border: 1px solid rgba(212,175,55,0.3);
      color: #d4af37;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      backdrop-filter: blur(20px);
      transition: transform 0.3s ease;
      z-index: 100;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="flyer">
    <div class="logo-container">
      <div class="logo-box">
        <span>D</span>
      </div>
    </div>

    <div class="brand">DONCIEL<sup>™</sup></div>
    <div class="subtitle">Journal de Trading Professionnel</div>

    <div class="features">
      <div class="feature">
        <span class="feature-icon">📊</span>
        <span class="feature-text">Analyses avancées en temps réel</span>
      </div>
      <div class="feature">
        <span class="feature-icon">🎯</span>
        <span class="feature-text">Suivi RR & statistiques détaillées</span>
      </div>
      <div class="feature">
        <span class="feature-icon">🎬</span>
        <span class="feature-text">Vidéos éducatives du Setup DONCIEL</span>
      </div>
      <div class="feature">
        <span class="feature-icon">📱</span>
        <span class="feature-text">Accessible sur mobile & desktop</span>
      </div>
    </div>

    <a href="https://donciel-trading.vercel.app" target="_blank" class="cta-button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Accéder à l'Application
    </a>

    <button class="share-button" onclick="shareApp()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      Partager
    </button>

    <div class="divider"></div>
    <div class="url-text">donciel-trading.vercel.app</div>
  </div>

  <div class="toast" id="toast">Lien copié !</div>

  <script>
    function shareApp() {
      const url = 'https://donciel-trading.vercel.app';
      const text = 'DONCIEL™ - Journal de Trading Professionnel';

      if (navigator.share) {
        navigator.share({ title: text, text: text, url: url }).catch(() => {});
      } else {
        navigator.clipboard.writeText(url).then(() => {
          const toast = document.getElementById('toast');
          toast.classList.add('show');
          setTimeout(() => toast.classList.remove('show'), 2500);
        }).catch(() => {
          window.open(url, '_blank');
        });
      }
    }
  </script>
</body>
</html>
